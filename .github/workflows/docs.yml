name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - "README.md"
      - "docs/**"
      - "CHANGELOG.md"
      - "examples/**"
      - "compose/assets/**"
      - "scripts/docsgen/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install Chrome
        run: |
          sudo wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -f -y

      - name: Generate documentation site
        run: go run ./scripts/docsgen

      - name: Build demo PDF (library example)
        run: go run ./examples

      - name: Build demo PDF (full-demo CLI)
        run: |
          go build -o pretty-pdf ./cmd/pretty-pdf
          ./pretty-pdf build --config examples/full-demo/go-pretty-pdf.yml --source examples/full-demo --out examples/full-demo/demo.pdf

      - name: Stage pages artifact
        run: |
          cp examples/output/example-output.pdf _site/library-demo.pdf
          cp examples/full-demo/demo.pdf _site/full-demo.pdf

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
