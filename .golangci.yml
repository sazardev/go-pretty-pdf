version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - goconst
    - gosimple
    - govet
    - ineffassign
    - misspell
    - nilerr
    - prealloc
    - staticcheck
    - tenv
    - unconvert
    - unused
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    goconst:
      min-len: 3
      min-occurrences: 3
    misspell:
      locale: US
  exclusions:
    paths:
      - bin
      - examples

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/sazardev/go-pretty-pdf
  exclusions:
    paths:
      - bin
      - examples

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
