title: "{{BOOK_TITLE}}"
subtitle: "A Comprehensive Guide"
author: "{{AUTHOR_NAME}}"
source: {{SOURCE_DIR}}
output: out.pdf
theme: {{THEME}}

vars:
  api_version: "v2.1"

lint:
  require_frontmatter:
    - id
    - title
  no_duplicate_ids: true
  max_heading_depth: 3

render:
  timeout: 60s
  paper: a4
