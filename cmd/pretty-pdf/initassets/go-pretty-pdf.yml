title: "{{BOOK_TITLE}}"
subtitle: "A Comprehensive Guide"
author: "{{AUTHOR_NAME}}"
source: {{SOURCE_DIR}}
output: out.pdf
theme: {{THEME}}

vars:
  api_version: "v2.1"

lint:
  require_frontmatter:
    - id
    - title
  no_duplicate_ids: true
  max_heading_depth: 3

render:
  timeout: 60s
  # Named sizes: letter, legal, a4
  # Custom dimensions: 6x9in, 6x9, 6in x 9in, 152.4mm x 228.6mm
  paper: a4
